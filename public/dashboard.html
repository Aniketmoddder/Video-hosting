<!DOCTYPE html>
<html lang="en" class="dark selection:bg-[#00F0FF] selection:text-[#000]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STREAM // Full Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Space Grotesk', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        void: '#000000', surface: '#0A0A0C', panel: 'rgba(15, 15, 20, 0.65)', 
                        borderline: 'rgba(255, 255, 255, 0.08)',
                        cyan: { DEFAULT: '#00F0FF' }, purple: { DEFAULT: '#8B5CF6' },
                        text: { main: '#FFFFFF', muted: '#888888', dark: '#444444' }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: var(--void); color: var(--text-main); overflow-x: hidden; padding-bottom: 100px; }
        ::-webkit-scrollbar { display: none; }
        
        .ambient-glow { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 0%, rgba(0, 240, 255, 0.05), transparent 50%); }
        .glass-card { background: var(--surface); border: 1px solid var(--borderline); border-radius: 24px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        /* Floating Navigation */
        .floating-dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(24px); border: 1px solid var(--borderline);
            border-radius: 40px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; z-index: 100;
            width: 90%; max-width: 380px; justify-content: space-between;
        }
        .dock-item { width: 48px; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: 0.3s; }
        .dock-item.active { color: var(--cyan); background: rgba(0, 240, 255, 0.1); }
        .dock-upload { width: 56px; height: 56px; border-radius: 28px; background: #FFF; color: #000; display: flex; align-items: center; justify-content: center; transform: translateY(-10px); border: 4px solid var(--void); transition: 0.3s; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        
        /* Views */
        .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Inputs */
        .cyber-input { background: rgba(255,255,255,0.03); border: 1px solid var(--borderline); border-radius: 16px; padding: 16px; color: #FFF; width: 100%; transition: 0.3s; font-family: 'JetBrains Mono'; font-size: 13px;}
        .cyber-input:focus { border-color: var(--cyan); outline: none; background: rgba(255,255,255,0.06); }
        
        /* List Items */
        .video-item { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--borderline); margin-bottom: 8px; transition: 0.2s; }
        .video-item:hover { border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <header class="fixed top-0 left-0 right-0 h-20 bg-void/80 backdrop-blur-xl border-b border-borderline z-50 flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-cyan shadow-[0_0_12px_#00F0FF] animate-pulse"></div>
            <span class="font-bold text-xl tracking-tighter">STREAM<span class="text-cyan">.</span></span>
        </div>
    </header>

    <main class="pt-28 px-4 max-w-4xl mx-auto">
        
        <section id="view-overview" class="view-section active">
            <h1 class="text-2xl font-bold mb-6">Dashboard</h1>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass-card col-span-2 p-6">
                    <div class="text-xs uppercase font-mono text-text-muted mb-2">Network Status</div>
                    <div class="flex items-center gap-2 text-emerald-400 font-mono text-sm">
                        <i data-lucide="check-circle" class="w-4 h-4"></i> API & R2 Online
                    </div>
                </div>
                <div class="glass-card col-span-1 p-6">
                    <i data-lucide="video" class="w-5 h-5 text-cyan mb-4"></i>
                    <div class="text-3xl font-mono" id="stat-total-videos">--</div>
                    <div class="text-[10px] text-text-muted font-mono uppercase mt-1">Total Assets</div>
                </div>
                <div class="glass-card col-span-1 p-6">
                    <i data-lucide="activity" class="w-5 h-5 text-purple mb-4"></i>
                    <div class="text-3xl font-mono">720p</div>
                    <div class="text-[10px] text-text-muted font-mono uppercase mt-1">HLS Encoding</div>
                </div>
            </div>
        </section>

        <section id="view-library" class="view-section">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Library</h1>
                <button onclick="fetchLibrary()" class="text-cyan hover:text-white"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </div>
            <div id="library-container" class="flex flex-col gap-2">
                <div class="text-center p-8 text-text-muted font-mono text-sm">Loading assets from R2...</div>
            </div>
        </section>

        <section id="view-upload" class="view-section">
            <h1 class="text-2xl font-bold mb-6">Ingest Media</h1>
            
            <div class="glass-card p-6 mb-6">
                <div class="flex border-b border-borderline mb-6 pb-2 gap-6">
                    <button class="text-cyan font-semibold text-sm border-b-2 border-cyan pb-2" id="tab-file">Local File</button>
                    <button class="text-text-muted font-semibold text-sm pb-2" id="tab-url">Remote URL</button>
                </div>

                <div id="upload-file-module">
                    <div class="border-2 dashed border-borderline rounded-2xl p-8 text-center hover:border-cyan transition-colors cursor-pointer" onclick="document.getElementById('videoInput').click()">
                        <i data-lucide="upload-cloud" class="w-8 h-8 text-cyan mx-auto mb-4"></i>
                        <p class="font-semibold">Tap to select video</p>
                        <p class="text-xs text-text-muted mt-2">MP4, MKV, WEBM (Max 1GB)</p>
                    </div>
                    <input type="file" id="videoInput" accept="video/*" class="hidden">
                </div>

                <div id="upload-url-module" class="hidden">
                    <label class="block text-xs font-mono text-text-muted mb-2">Source URL (.mp4 or .m3u8)</label>
                    <input type="url" id="urlInput" class="cyber-input mb-4" placeholder="https://...">
                    <button id="submitUrlBtn" class="w-full py-4 bg-white text-black font-bold rounded-xl">Process URL</button>
                </div>
            </div>

            <div id="job-tracker" class="glass-card p-6 hidden">
                <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="cpu" class="text-cyan w-5 h-5"></i> FFmpeg Engine</h3>
                <div class="flex items-center justify-between mb-2">
                    <span class="text-xs font-mono text-text-muted" id="job-id">ID: ...</span>
                    <span class="text-xs font-mono text-amber-400 animate-pulse" id="job-status">PROCESSING</span>
                </div>
                <div class="w-full h-2 bg-void rounded-full overflow-hidden border border-borderline">
                    <div class="h-full bg-cyan w-full animate-[pulse_1s_ease-in-out_infinite]" style="transform-origin: left; animation: loadingBar 2s infinite;"></div>
                </div>
            </div>
        </section>

    </main>

    <nav class="floating-dock">
        <button class="dock-item active" onclick="switchView('overview', this)"><i data-lucide="layout-dashboard"></i></button>
        <button class="dock-item" onclick="switchView('library', this); fetchLibrary();"><i data-lucide="folder-video"></i></button>
        <button class="dock-upload" onclick="switchView('upload', null)"><i data-lucide="plus" class="w-6 h-6"></i></button>
        <button class="dock-item"><i data-lucide="settings"></i></button>
    </nav>

    <script>
        lucide.createIcons();
        const API_BASE = window.location.origin; // CHANGE TO YOUR LIVE BACKEND URL

        // --- Navigation ---
        function switchView(viewId, btn) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            if(btn) {
                document.querySelectorAll('.dock-item').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        // --- Upload Tabs ---
        document.getElementById('tab-file').onclick = (e) => {
            e.target.classList.add('text-cyan', 'border-b-2', 'border-cyan');
            e.target.classList.remove('text-text-muted');
            document.getElementById('tab-url').classList.remove('text-cyan', 'border-b-2', 'border-cyan');
            document.getElementById('tab-url').classList.add('text-text-muted');
            document.getElementById('upload-file-module').classList.remove('hidden');
            document.getElementById('upload-url-module').classList.add('hidden');
        };
        document.getElementById('tab-url').onclick = (e) => {
            e.target.classList.add('text-cyan', 'border-b-2', 'border-cyan');
            e.target.classList.remove('text-text-muted');
            document.getElementById('tab-file').classList.remove('text-cyan', 'border-b-2', 'border-cyan');
            document.getElementById('tab-file').classList.add('text-text-muted');
            document.getElementById('upload-url-module').classList.remove('hidden');
            document.getElementById('upload-file-module').classList.add('hidden');
        };

        // --- Library Management ---
        async function fetchLibrary() {
            const container = document.getElementById('library-container');
            container.innerHTML = '<div class="text-center p-4"><i data-lucide="loader" class="animate-spin mx-auto text-cyan"></i></div>';
            lucide.createIcons();

            try {
                const res = await fetch(`${API_BASE}/videos`);
                const data = await res.json();
                
                document.getElementById('stat-total-videos').textContent = data.videos ? data.videos.length : 0;
                
                if(!data.videos || data.videos.length === 0) {
                    container.innerHTML = '<div class="text-center p-8 text-text-muted font-mono text-sm">No assets found in R2.</div>';
                    return;
                }

                container.innerHTML = data.videos.map(v => `
                    <div class="video-item" id="vid-${v.id}">
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-semibold truncate text-white">${v.id}</h4>
                            <div class="text-[10px] font-mono text-cyan mt-1 truncate">${v.url}</div>
                        </div>
                        <button onclick="copyUrl('${v.url}')" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-white hover:bg-cyan hover:text-black"><i data-lucide="copy" class="w-3 h-3"></i></button>
                        <button onclick="deleteVideo('${v.id}')" class="w-8 h-8 rounded-full bg-rose-500/10 flex items-center justify-center text-rose-500 hover:bg-rose-500 hover:text-white"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                container.innerHTML = `<div class="text-rose-500 text-xs font-mono p-4">Connection error. Is backend running?</div>`;
            }
        }

        async function deleteVideo(id) {
            if(!confirm("Permenantly delete from Cloudflare R2?")) return;
            try {
                await fetch(`${API_BASE}/video/${id}`, { method: 'DELETE' });
                document.getElementById(`vid-${id}`).remove();
                fetchLibrary(); // Refresh stats
            } catch (err) { alert("Failed to delete."); }
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url);
            alert("HLS URL Copied!");
        }

        // --- Upload & Job Polling Logic ---
        const tracker = document.getElementById('job-tracker');
        const statusText = document.getElementById('job-status');
        const jobIdText = document.getElementById('job-id');

        async function pollJobStatus(jobId) {
            tracker.classList.remove('hidden');
            jobIdText.textContent = `ID: ${jobId.substring(0,8)}...`;
            statusText.textContent = "ENCODING...";
            statusText.className = "text-xs font-mono text-amber-400 animate-pulse";

            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/status/${jobId}`);
                    const job = await res.json();

                    if (job.status === 'completed') {
                        clearInterval(interval);
                        statusText.textContent = "COMPLETED";
                        statusText.className = "text-xs font-mono text-emerald-400";
                        setTimeout(() => { tracker.classList.add('hidden'); fetchLibrary(); switchView('library', document.querySelectorAll('.dock-item')[1]); }, 2000);
                    } else if (job.status === 'failed') {
                        clearInterval(interval);
                        statusText.textContent = "FAILED";
                        statusText.className = "text-xs font-mono text-rose-500";
                    }
                } catch (e) {
                    clearInterval(interval);
                }
            }, 2000); // Poll every 2 seconds
        }

        // Handle File Upload
        document.getElementById('videoInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const formData = new FormData();
            formData.append('video', file);

            try {
                tracker.classList.remove('hidden');
                statusText.textContent = "UPLOADING TO SERVER...";
                
                const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                
                if(data.success) pollJobStatus(data.videoId);
            } catch (err) { alert("Upload failed."); tracker.classList.add('hidden'); }
        });

        // Handle URL Upload
        document.getElementById('submitUrlBtn').addEventListener('click', async () => {
            const url = document.getElementById('urlInput').value;
            if(!url) return;

            try {
                tracker.classList.remove('hidden');
                statusText.textContent = "SENDING URL...";
                
                const res = await fetch(`${API_BASE}/upload-url`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ videoUrl: url })
                });
                const data = await res.json();
                
                if(data.success) pollJobStatus(data.videoId);
            } catch (err) { alert("Upload failed."); tracker.classList.add('hidden'); }
        });

        // Add dummy CSS animation for the progress bar
        const style = document.createElement('style');
        style.innerHTML = `@keyframes loadingBar { 0% { transform: scaleX(0); } 50% { transform: scaleX(1); } 100% { transform: scaleX(0); transform-origin: right; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
