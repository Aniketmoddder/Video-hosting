<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STREAM // Infrastructure</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        base: '#090A0F',      // Deep indigo/black background
                        surface: '#12131A',   // Solid card background
                        borderline: 'rgba(255, 255, 255, 0.08)',
                        textMain: '#FAFAFA',
                        textMuted: '#A1A1AA',
                        accent: '#06B6D4',    // Clean Teal/Cyan for active states
                        success: '#10B981',   // Soft Green
                        error: '#EF4444'      // Soft Red
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Reset & Native Mobile Feel */
        body { 
            background-color: theme('colors.base'); 
            color: theme('colors.textMain'); 
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }
        
        ::-webkit-scrollbar { display: none; }

        /* 📱 Core SaaS Components */
        .saas-card {
            background-color: theme('colors.surface');
            border: 1px solid theme('colors.borderline');
            border-radius: 16px;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease;
        }
        /* Micro-interaction: Tactile click */
        .clickable:active { transform: scale(0.96); }
        
        /* Inputs & Buttons */
        .saas-input {
            background: rgba(255,255,255,0.03); border: 1px solid theme('colors.borderline');
            border-radius: 12px; padding: 14px 16px; color: white; width: 100%; transition: 0.2s;
            font-size: 14px;
        }
        .saas-input:focus { border-color: theme('colors.accent'); outline: none; background: rgba(255,255,255,0.05); }
        
        .saas-btn-primary {
            background-color: white; color: black; border: none; border-radius: 12px;
            padding: 14px 16px; font-weight: 600; font-size: 14px; width: 100%;
            display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s;
        }
        .saas-btn-primary:active { transform: scale(0.96); background-color: #E4E4E7; }

        /* 📈 Live Waveform Animation */
        .waveform { display: flex; align-items: flex-end; gap: 3px; height: 24px; }
        .wave-bar { width: 3px; background-color: theme('colors.accent'); border-radius: 2px; animation: wave 1.2s ease-in-out infinite; }
        .wave-bar:nth-child(1) { animation-delay: 0.0s; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; }
        .wave-bar:nth-child(4) { animation-delay: 0.6s; }
        @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 24px; } }

        /* View Switching */
        .view-section { display: none; animation: subtleFadeIn 0.3s ease forwards; }
        .view-section.active { display: block; }
        @keyframes subtleFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Navigation Edge-to-Edge */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background-color: rgba(9, 10, 15, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid theme('colors.borderline'); z-index: 50;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { color: theme('colors.textMuted'); transition: 0.2s; display: flex; flex-direction: column; items-center; gap: 4px; }
        .nav-item.active { color: theme('colors.accent'); }
        
        .fab-button {
            width: 48px; height: 48px; background-color: theme('colors.accent'); color: black;
            border-radius: 24px; display: flex; align-items: center; justify-content: center;
            transform: translateY(-8px); box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
    </style>
</head>
<body>

    <header class="flex justify-between items-center px-5 py-5 sticky top-0 bg-base/90 backdrop-blur-md z-40 border-b border-borderline/50">
        <div class="font-bold text-lg tracking-tight">STREAM</div>
        <div class="flex items-center gap-2 bg-success/10 text-success px-2.5 py-1.5 rounded-md text-[11px] font-semibold tracking-wide border border-success/20">
            <span class="w-1.5 h-1.5 bg-success rounded-full animate-pulse"></span> R2 CONNECTED
        </div>
    </header>

    <main class="px-5 pt-6 pb-6 max-w-lg mx-auto">
        
        <section id="view-overview" class="view-section active">
            <div class="mb-6">
                <h1 class="text-2xl font-bold tracking-tight mb-1">Dashboard</h1>
                <p class="text-sm text-textMuted font-medium">System telemetry</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                
                <div class="saas-card clickable col-span-2 p-5 relative">
                    <div class="flex justify-between items-start mb-6">
                        <div class="text-[11px] font-semibold text-textMuted uppercase tracking-wider">Streaming Quality</div>
                        <div class="waveform">
                            <div class="wave-bar"></div><div class="wave-bar"></div>
                            <div class="wave-bar"></div><div class="wave-bar"></div>
                        </div>
                    </div>
                    <div class="flex items-baseline gap-3">
                        <div class="text-5xl font-bold tracking-tighter">720p</div>
                        <div class="text-sm text-success font-medium flex items-center gap-1">
                            <i data-lucide="check-circle-2" class="w-4 h-4"></i> Active
                        </div>
                    </div>
                </div>

                <div class="saas-card clickable col-span-1 p-5 flex flex-col justify-between min-h-[140px]">
                    <i data-lucide="video" class="w-5 h-5 text-textMuted mb-4"></i>
                    <div>
                        <div class="text-2xl font-bold tracking-tight mb-0.5" id="stat-videos">--</div>
                        <div class="text-[11px] font-semibold text-textMuted uppercase tracking-wider">Total Assets</div>
                    </div>
                </div>

                <div class="saas-card clickable col-span-1 p-5 flex flex-col justify-between min-h-[140px]">
                    <i data-lucide="database" class="w-5 h-5 text-textMuted mb-4"></i>
                    <div>
                        <div class="text-2xl font-bold tracking-tight mb-0.5">R2</div>
                        <div class="text-[11px] font-semibold text-success uppercase tracking-wider">Operational</div>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-library" class="view-section">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight mb-1">Library</h1>
                    <p class="text-sm text-textMuted font-medium">Manage R2 buckets</p>
                </div>
                <button onclick="fetchLibrary()" class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center text-textMain clickable transition-colors">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
            
            <div class="flex flex-col gap-3" id="library-container">
                <div class="text-center p-8 text-textMuted text-sm font-medium">Syncing data...</div>
            </div>
        </section>

        <section id="view-upload" class="view-section">
            <div class="mb-6">
                <h1 class="text-2xl font-bold tracking-tight mb-1">Ingest Media</h1>
                <p class="text-sm text-textMuted font-medium">Process and encode to HLS</p>
            </div>
            
            <div class="saas-card p-5 mb-6">
                <div class="flex p-1 bg-black/40 border border-borderline rounded-xl mb-6">
                    <button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white/10 text-white shadow-sm transition-all" id="tab-file">Local File</button>
                    <button class="flex-1 py-2 text-sm font-semibold rounded-lg text-textMuted transition-all" id="tab-url">Remote URL</button>
                </div>

                <div id="upload-file-module">
                    <div class="border border-dashed border-borderline rounded-xl p-8 text-center clickable transition-colors hover:border-accent" onclick="document.getElementById('videoInput').click()">
                        <i data-lucide="upload-cloud" class="w-6 h-6 text-textMuted mx-auto mb-3"></i>
                        <p class="font-semibold text-sm mb-1">Select video file</p>
                        <p class="text-[11px] text-textMuted">MP4, MKV, WEBM (Max 1GB)</p>
                    </div>
                    <input type="file" id="videoInput" accept="video/*" class="hidden">
                </div>

                <div id="upload-url-module" class="hidden">
                    <label class="block text-[11px] font-semibold text-textMuted uppercase tracking-wider mb-2 ml-1">Source URL</label>
                    <input type="url" id="urlInput" class="saas-input mb-4" placeholder="https://example.com/video.mp4">
                    <button id="submitUrlBtn" class="saas-btn-primary clickable">
                        Process URL <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <div id="job-tracker" class="saas-card p-5 hidden">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2 font-semibold text-sm">
                        <i data-lucide="cpu" class="w-4 h-4 text-accent"></i> FFmpeg Engine
                    </div>
                    <span class="text-[10px] font-bold text-accent bg-accent/10 px-2 py-1 rounded-md tracking-wider uppercase" id="job-status">Encoding</span>
                </div>
                
                <div class="w-full h-1.5 bg-black/50 border border-borderline rounded-full overflow-hidden mb-3">
                    <div class="h-full bg-accent w-full" style="animation: indeterminate 1.5s infinite ease-in-out;"></div>
                </div>
                <div class="text-[11px] text-textMuted truncate font-mono" id="job-id">ID: initializing...</div>
            </div>
        </section>

    </main>

    <nav class="bottom-nav flex justify-around items-center px-6 py-3">
        <button class="nav-item active clickable" onclick="switchView('overview', this)">
            <i data-lucide="home" class="w-5 h-5 mb-1"></i>
            <span class="text-[10px] font-semibold">Home</span>
        </button>
        <button class="nav-item clickable" onclick="switchView('library', this); fetchLibrary();">
            <i data-lucide="folder" class="w-5 h-5 mb-1"></i>
            <span class="text-[10px] font-semibold">Files</span>
        </button>
        
        <button class="fab-button clickable" onclick="switchView('upload', null); deactivateNavs();">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
        
        <button class="nav-item clickable">
            <i data-lucide="bar-chart-2" class="w-5 h-5 mb-1"></i>
            <span class="text-[10px] font-semibold">Data</span>
        </button>
        <button class="nav-item clickable">
            <i data-lucide="settings" class="w-5 h-5 mb-1"></i>
            <span class="text-[10px] font-semibold">Settings</span>
        </button>
    </nav>

    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 bg-white text-black px-4 py-2.5 rounded-full font-semibold text-[13px] shadow-lg transition-all duration-300 opacity-0 translate-y-[-10px] pointer-events-none z-[100] flex items-center gap-2">
        <i data-lucide="info" class="w-4 h-4"></i> <span id="toast-msg">Message</span>
    </div>

    <style>
        @keyframes indeterminate { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>

    <script>
        lucide.createIcons();
        const API_BASE = window.location.origin; // Dynamically uses your Railway URL

        // --- Core UI Functions ---
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.style.opacity = '1'; toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translate(-50%, -10px)'; }, 3000);
        }

        function switchView(viewId, btn) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            if(btn) {
                deactivateNavs();
                btn.classList.add('active');
            }
        }

        function deactivateNavs() {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        }

        // --- Upload Tabs ---
        document.getElementById('tab-file').onclick = () => {
            document.getElementById('tab-file').className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white/10 text-white shadow-sm transition-all";
            document.getElementById('tab-url').className = "flex-1 py-2 text-sm font-semibold rounded-lg text-textMuted transition-all";
            document.getElementById('upload-file-module').classList.remove('hidden');
            document.getElementById('upload-url-module').classList.add('hidden');
        };
        document.getElementById('tab-url').onclick = () => {
            document.getElementById('tab-url').className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-white/10 text-white shadow-sm transition-all";
            document.getElementById('tab-file').className = "flex-1 py-2 text-sm font-semibold rounded-lg text-textMuted transition-all";
            document.getElementById('upload-url-module').classList.remove('hidden');
            document.getElementById('upload-file-module').classList.add('hidden');
        };

        // --- Library Logic ---
        async function fetchLibrary() {
            const container = document.getElementById('library-container');
            container.innerHTML = '<div class="text-center p-6 text-textMuted text-sm font-medium"><i data-lucide="loader" class="animate-spin inline w-4 h-4 mr-2"></i> Syncing...</div>';
            lucide.createIcons();

            try {
                const res = await fetch(`${API_BASE}/videos`);
                const data = await res.json();
                
                document.getElementById('stat-videos').textContent = data.videos ? data.videos.length : 0;
                
                if(!data.videos || data.videos.length === 0) {
                    container.innerHTML = '<div class="text-center p-8 text-textMuted text-sm font-medium">No assets found in R2.</div>';
                    return;
                }

                container.innerHTML = data.videos.map(v => `
                    <div class="saas-card clickable p-4 flex items-center gap-4" id="vid-${v.id}">
                        <div class="w-10 h-10 rounded-lg bg-accent/10 text-accent flex items-center justify-center shrink-0">
                            <i data-lucide="film" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-[13px] font-semibold truncate text-white">${v.id.substring(0, 18)}...</h4>
                            <div class="text-[11px] font-medium text-textMuted mt-0.5">master.m3u8</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyUrl('${v.url}')" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-textMuted hover:text-white transition-colors"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button>
                            <button onclick="deleteVideo('${v.id}')" class="w-8 h-8 rounded-full bg-error/10 flex items-center justify-center text-error hover:bg-error hover:text-white transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                container.innerHTML = `<div class="text-error text-sm font-medium p-6 text-center">API Offline.</div>`;
            }
        }

        async function deleteVideo(id) {
            if(!confirm("Permanently delete this asset?")) return;
            try {
                await fetch(`${API_BASE}/video/${id}`, { method: 'DELETE' });
                document.getElementById(`vid-${id}`).remove();
                showToast("Asset deleted");
                fetchLibrary();
            } catch (err) { showToast("Delete failed"); }
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url);
            showToast("HLS URL Copied");
        }

        // --- Upload & Job Polling Logic ---
        const tracker = document.getElementById('job-tracker');
        const statusText = document.getElementById('job-status');
        const jobIdText = document.getElementById('job-id');

        async function pollJobStatus(jobId) {
            tracker.classList.remove('hidden');
            jobIdText.textContent = `ID: ${jobId}`;
            statusText.textContent = "ENCODING";
            statusText.className = "text-[10px] font-bold text-accent bg-accent/10 px-2 py-1 rounded-md tracking-wider uppercase";

            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/status/${jobId}`);
                    const job = await res.json();

                    if (job.status === 'completed') {
                        clearInterval(interval);
                        statusText.textContent = "SUCCESS";
                        statusText.className = "text-[10px] font-bold text-success bg-success/10 px-2 py-1 rounded-md tracking-wider uppercase";
                        showToast("Encoding completed successfully");
                        setTimeout(() => { 
                            tracker.classList.add('hidden'); 
                            fetchLibrary(); 
                            switchView('library', document.querySelectorAll('.nav-item')[1]); 
                        }, 2000);
                    } else if (job.status === 'failed') {
                        clearInterval(interval);
                        statusText.textContent = "FAILED";
                        statusText.className = "text-[10px] font-bold text-error bg-error/10 px-2 py-1 rounded-md tracking-wider uppercase";
                        showToast("FFmpeg Encoding Failed");
                    }
                } catch (e) { clearInterval(interval); }
            }, 2000);
        }

        // Handle File Upload
        document.getElementById('videoInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const formData = new FormData();
            formData.append('video', file);

            try {
                tracker.classList.remove('hidden');
                statusText.textContent = "UPLOADING";
                showToast("Transmitting payload...");
                
                const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                
                if(data.success) pollJobStatus(data.videoId);
            } catch (err) { showToast("Upload failed"); tracker.classList.add('hidden'); }
        });

        // Handle URL Upload
        document.getElementById('submitUrlBtn').addEventListener('click', async () => {
            const url = document.getElementById('urlInput').value;
            if(!url) return showToast("Enter a valid URL");

            try {
                tracker.classList.remove('hidden');
                statusText.textContent = "FETCHING";
                
                const res = await fetch(`${API_BASE}/upload-url`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ videoUrl: url })
                });
                const data = await res.json();
                
                if(data.success) pollJobStatus(data.videoId);
            } catch (err) { showToast("Fetch failed"); tracker.classList.add('hidden'); }
        });

        // Initial Load
        fetchLibrary();
    </script>
</body>
</html>
